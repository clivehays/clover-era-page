<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clover ERA</title>
<style>
  :root {
    --teal: #46AEB8;
    --coral: #E07A5F;
    --urgent: #D85A30;
    --dark: #0A0A0A;
    --muted: #6B6B6B;
    --border: rgba(0,0,0,0.08);
    --card-bg: #FFFFFF;
    --page-bg: transparent;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--page-bg); color: var(--dark); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.45;
    padding: 20px 16px 80px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    gap: 12px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .header .clock {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rt-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #cfcfcf;
    display: inline-block;
  }
  .rt-dot.live { background: #27500A; }
  .rt-dot.poll { background: #B87200; }

  /* Status bar */
  .status {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 22px;
    line-height: 1.55;
  }
  .status .need {
    color: var(--urgent);
    font-weight: 500;
  }

  /* Section */
  section { margin-bottom: 28px; }
  .section-head {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 10px 0;
  }
  .section-empty {
    font-size: 13px;
    color: var(--muted);
    padding: 2px 2px 4px;
  }

  /* Card */
  .card {
    background: var(--card-bg);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: opacity 300ms ease;
  }
  .card.urgent {
    border-left: 3px solid var(--urgent);
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
  }
  .card.done { opacity: 0.45; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    flex-wrap: wrap;
  }
  .card-left { flex: 1 1 auto; min-width: 0; }

  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
    line-height: 1.5;
  }
  .badge-reply { background: #FAECE7; color: #712B13; }
  .badge-post { background: #E6F1FB; color: #0C447C; }
  .badge-outreach { background: #E1F5EE; color: #085041; }
  .badge-mgi { background: #FAEEDA; color: #633806; }
  .pill-intent {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .pill-high { background: #EAF3DE; color: #27500A; }
  .pill-medium { background: #FAEEDA; color: #633806; }
  .pill-low { background: #F1EFE8; color: #444441; }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 4px 0;
    word-wrap: break-word;
  }
  .card-meta {
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 8px 0;
  }
  .card-body {
    font-size: 13px;
    margin: 0 0 10px 0;
  }
  .card-body.italic { font-style: italic; }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  button, .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    padding: 10px 14px;
    min-height: 44px;
    min-width: 44px;
    cursor: pointer;
    border: 0.5px solid var(--border);
    background: transparent;
    color: inherit;
  }
  .btn-primary {
    background: var(--teal);
    color: white;
    border-color: var(--teal);
  }
  .btn-primary:disabled, .btn-done {
    background: #d9d9d9;
    color: #6b6b6b;
    border-color: transparent;
    cursor: default;
  }
  .btn-link {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 10px 8px;
    text-decoration: underline;
    font-size: 12px;
    min-height: 36px;
  }

  /* Post preview */
  .preview {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    background: #F4F4F2;
    border-radius: 8px;
    padding: 10px 12px;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0 0 10px 0;
  }
  .warning {
    background: #FAECE7;
    color: #712B13;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 10px;
  }

  /* Composer */
  .composer { margin-top: 10px; }
  textarea {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    min-height: 96px;
    background: #FFFFFF;
    color: inherit;
  }
  .composer-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  /* Sequence sub-cards */
  .sub-card {
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
  }
  .sub-card-head {
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .sub-card-subject {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .sub-card-body {
    background: #F4F4F2;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 6px;
    white-space: pre-wrap;
    margin-bottom: 8px;
  }
  .sub-card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-small {
    font-size: 12px;
    padding: 6px 10px;
    min-height: 32px;
  }

  /* Checkbox */
  .card-check {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .check-box {
    width: 18px; height: 18px;
    border: 0.5px solid var(--border);
    border-radius: 50%;
    flex: 0 0 18px;
    margin-top: 3px;
    cursor: pointer;
  }
  .check-box.on {
    background: var(--teal);
    border-color: var(--teal);
    position: relative;
  }
  .check-box.on::after {
    content: "";
    position: absolute;
    left: 5px; top: 2px;
    width: 5px; height: 9px;
    border: solid white;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }

  /* Floating bar */
  .floating-bar {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    background: var(--dark);
    color: white;
    padding: 10px 16px;
    border-radius: 999px;
    display: none;
    gap: 10px;
    align-items: center;
    z-index: 50;
  }
  .floating-bar button {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    min-height: 36px;
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    border-top: 0.5px solid var(--border);
    padding-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  /* Skeleton */
  .skeleton {
    background: #EFEFEC;
    border-radius: 12px;
    height: 72px;
    margin-bottom: 10px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* Toast */
  .toast {
    position: fixed;
    right: 16px;
    bottom: 16px;
    background: #FAECE7;
    color: #712B13;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    z-index: 60;
  }

  /* Auth */
  .auth-screen {
    position: fixed;
    inset: 0;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .auth-card {
    width: 100%;
    max-width: 320px;
    padding: 20px;
  }
  .auth-card input {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .auth-err {
    color: var(--urgent);
    font-size: 12px;
    margin-top: 6px;
  }

  /* Error screen */
  .error-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .error-screen h2 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 10px;
  }

  /* Reply send/action animation */
  .new-flash { animation: slidein 200ms ease-out; }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile */
  @media (max-width: 700px) {
    body { padding: 16px 12px 80px; }
    .header { flex-direction: column; align-items: flex-start; gap: 4px; }
    .card-actions { width: 100%; }
    .card-actions button, .card-actions .btn { flex: 1 1 auto; }
  }
</style>
</head>
<body>

<div id="auth" class="auth-screen" style="display:none">
  <div class="auth-card">
    <h1 style="font-size:16px;font-weight:500;margin:0 0 12px 0">Clover ERA</h1>
    <input id="auth-input" type="password" placeholder="Access password" autocomplete="current-password">
    <button id="auth-submit" class="btn btn-primary" style="width:100%">Enter</button>
    <div id="auth-err" class="auth-err" style="display:none"></div>
  </div>
</div>

<div class="wrap" id="app" style="display:none">

  <div class="header">
    <h1 id="greeting">Loading</h1>
    <div class="clock">
      <span id="clock"></span>
      <span id="rt-dot" class="rt-dot" title="Connection"></span>
    </div>
  </div>

  <div class="status" id="status-bar">Loading counts</div>

  <section id="sec-replies">
    <h2 class="section-head">Replies first</h2>
    <div id="replies-list">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <section id="sec-post">
    <h2 class="section-head">Today's post</h2>
    <div id="post-list">
      <div class="skeleton"></div>
    </div>
  </section>

  <section id="sec-outreach">
    <h2 class="section-head">Outreach to approve</h2>
    <div id="outreach-list">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <section id="sec-other">
    <h2 class="section-head">Other</h2>
    <div id="other-list">
      <div class="skeleton"></div>
    </div>
  </section>

  <div class="footer" id="footer">Loading overnight status</div>
</div>

<div id="floating-bar" class="floating-bar">
  <span id="selected-count">0 selected</span>
  <button id="approve-selected">Approve selected</button>
</div>

<div id="toast-root"></div>

<div id="error-screen" class="error-screen" style="display:none">
  <h2>Can't reach the database.</h2>
  <p style="color:var(--muted);font-size:13px">Check your connection.</p>
  <button class="btn btn-primary" onclick="location.reload()">Retry</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ============================================================
// CONFIG — paste your anon key from Supabase > Settings > API
// ============================================================
const SUPABASE_URL = 'https://drugebiitlcjkknjfxeh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRydWdlYmlpdGxjamtrbmpmeGVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI3NjY1MDQsImV4cCI6MjA3ODM0MjUwNH0.HaYY0UxEC4cYyC3V4O0RyIkm7JTljnQapUnaeBoXba8';

// Review level controls which sections render.
// 1 = all sections (default)
// 2 = hide follow-up email approvals, keep first-touch only
// 3 = hide all outreach approvals
// 4 = replies only
const REVIEW_LEVEL = 1;

const SESSION_KEY = 'clover_cc_session';
const SESSION_TTL_MS = 30 * 24 * 60 * 60 * 1000; // 30 days
const POLL_MS = 120000;

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
const state = {
  replies: [],
  post: null,
  outreach: [],
  other: [],
  actioned: new Set(),        // id strings just actioned in this session
  selectedProspects: new Set(),
  realtime: false,
  overnight: { researched: 0, inPipeline: 0 },
  failedTables: new Set(),
};

// ============================================================
// AUTH
// ============================================================
function hasSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const obj = JSON.parse(raw);
    return obj && obj.exp && obj.exp > Date.now();
  } catch { return false; }
}
function setSession() {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ exp: Date.now() + SESSION_TTL_MS }));
}
async function verifyPassword(pwd) {
  const { data, error } = await sb.rpc('verify_access_password', { pwd });
  if (error) throw error;
  return data === true;
}
function showAuth() {
  document.getElementById('auth').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  const input = document.getElementById('auth-input');
  const submit = document.getElementById('auth-submit');
  const err = document.getElementById('auth-err');
  input.focus();
  const go = async () => {
    err.style.display = 'none';
    submit.disabled = true;
    try {
      const ok = await verifyPassword(input.value);
      if (ok) { setSession(); location.reload(); }
      else { err.textContent = 'Wrong password.'; err.style.display = 'block'; }
    } catch (e) {
      err.textContent = 'Cannot verify. Check connection.';
      err.style.display = 'block';
    } finally { submit.disabled = false; }
  };
  submit.onclick = go;
  input.onkeydown = (e) => { if (e.key === 'Enter') go(); };
}

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function timeSince(iso) {
  if (!iso) return '';
  const secs = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
  if (secs < 60) return 'just now';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}
function greeting() {
  const d = new Date();
  const day = d.toLocaleDateString(undefined, { weekday: 'long' });
  const h = d.getHours();
  const tod = h < 12 ? 'morning' : (h < 18 ? 'afternoon' : 'evening');
  return day.toLowerCase() + ' ' + tod;
}
function clockText() {
  const d = new Date();
  const date = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  const time = d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
  return date + ' · ' + time;
}
function updateHeader() {
  document.getElementById('greeting').textContent = greeting();
  document.getElementById('clock').textContent = clockText();
}
function intentPill(score) {
  if (score == null) return '';
  if (score >= 80) return '<span class="pill-intent pill-high">high intent ' + score + '</span>';
  if (score >= 50) return '<span class="pill-intent pill-medium">medium ' + score + '</span>';
  return '<span class="pill-intent pill-low">low ' + score + '</span>';
}
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.getElementById('toast-root').appendChild(t);
  setTimeout(() => t.remove(), 5000);
}
function sectionEmpty(container, text) {
  container.innerHTML = '<div class="section-empty">' + escapeHtml(text) + '</div>';
}
function sentence(str, max = 200) {
  if (!str) return '';
  const s = String(str).trim();
  return s.length > max ? s.slice(0, max).trim() + '…' : s;
}

// ============================================================
// DATA FETCH
// ============================================================
async function safeFetch(name, fn) {
  try { return await fn(); }
  catch (e) {
    console.warn('[' + name + '] fetch failed:', e.message || e);
    state.failedTables.add(name);
    return null;
  }
}

async function fetchReplies() {
  return safeFetch('replies', async () => {
    const { data, error } = await sb
      .from('outreach_prospects')
      .select('id, status, actioned, updated_at, contact_id, company_id, contacts(first_name,last_name,title), companies(name)')
      .eq('status', 'replied')
      .eq('actioned', false)
      .limit(50);
    if (error) throw error;

    const results = [];
    for (const p of (data || [])) {
      const { data: emails } = await sb
        .from('outreach_emails')
        .select('id, body_text, created_at, sequence_step, email_type')
        .eq('prospect_id', p.id)
        .eq('status', 'replied')
        .order('created_at', { ascending: false })
        .limit(1);
      const replyEmail = (emails || [])[0] || null;

      let intent = null;
      let suggestion = null;
      try {
        const { data: scores } = await sb
          .from('reply_intent_scores')
          .select('score, ai_suggested_response, created_at')
          .eq('prospect_id', p.id)
          .order('created_at', { ascending: false })
          .limit(1);
        if (scores && scores.length) {
          intent = scores[0].score;
          suggestion = scores[0].ai_suggested_response;
        }
      } catch {}

      results.push({
        id: p.id,
        contact_id: p.contact_id,
        company_id: p.company_id,
        contact: p.contacts || {},
        company: p.companies || {},
        reply: replyEmail,
        updated_at: replyEmail?.created_at || p.updated_at,
        intent,
        suggestion,
      });
    }
    results.sort((a, b) => {
      const ai = a.intent == null ? -1 : a.intent;
      const bi = b.intent == null ? -1 : b.intent;
      if (bi !== ai) return bi - ai;
      return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
    });
    return results;
  });
}

async function fetchPost() {
  return safeFetch('linkedin_post_drafts', async () => {
    const today = new Date().toISOString().slice(0, 10);
    const { data, error } = await sb
      .from('linkedin_post_drafts')
      .select('*')
      .eq('post_date', today)
      .eq('status', 'draft')
      .order('created_at', { ascending: false })
      .limit(1);
    if (error) throw error;
    return (data || [])[0] || null;
  });
}

async function fetchOutreach() {
  return safeFetch('outreach', async () => {
    const { data, error } = await sb
      .from('outreach_prospects')
      .select('id, status, drafts_generated, icp_score, sector, employee_count, turnover_estimate_low, turnover_estimate_high, contacts(first_name,last_name,title), companies(name)')
      .eq('status', 'drafted')
      .eq('drafts_generated', true)
      .limit(50);
    if (error) throw error;
    const rows = [];
    for (const p of (data || [])) {
      const { data: emails } = await sb
        .from('outreach_emails')
        .select('id, subject_line, body_text, sequence_step, email_type, status')
        .eq('prospect_id', p.id)
        .order('sequence_step', { ascending: true });
      rows.push({
        ...p,
        contact: p.contacts || {},
        company: p.companies || {},
        emails: emails || [],
      });
    }
    return rows;
  });
}

async function fetchOther() {
  return safeFetch('mgi_results', async () => {
    const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
    const { data, error } = await sb
      .from('mgi_results')
      .select('*')
      .gte('created_at', since)
      .or('reviewed.is.null,reviewed.eq.false')
      .order('created_at', { ascending: false })
      .limit(20);
    if (error) throw error;
    return data || [];
  });
}

async function fetchOvernight() {
  return safeFetch('overnight', async () => {
    const since = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
    const { count: researched } = await sb
      .from('outreach_prospects')
      .select('id', { count: 'exact', head: true })
      .gte('created_at', since);
    const { count: inPipe } = await sb
      .from('outreach_prospects')
      .select('id', { count: 'exact', head: true })
      .not('status', 'in', '(completed,churned,inactive)');
    return { researched: researched || 0, inPipeline: inPipe || 0 };
  });
}

// ============================================================
// RENDER
// ============================================================
function renderStatusBar() {
  const rCount = state.replies.length;
  const pCount = state.post && state.post.status === 'draft' ? 1 : 0;
  const oCount = state.outreach.length;
  const mCount = state.other.length;
  const total = rCount + pCount + oCount + mCount;

  const el = document.getElementById('status-bar');
  if (total === 0) {
    el.innerHTML = 'All caught up. Next research runs at 00:01 UTC.';
  } else {
    const parts = [];
    parts.push((rCount > 0
      ? '<span class="need">' + rCount + ' ' + (rCount === 1 ? 'reply' : 'replies') + ' need you</span>'
      : '0 replies need you'));
    parts.push(pCount + ' post ready');
    parts.push(oCount + ' ' + (oCount === 1 ? 'sequence' : 'sequences') + ' drafted');
    parts.push(mCount + ' MGI ' + (mCount === 1 ? 'completed' : 'completed'));
    el.innerHTML = parts.join(' · ');
  }
  document.title = total > 0 ? '(' + total + ') Clover ERA' : 'Clover ERA';
}

function renderReplies() {
  const root = document.getElementById('replies-list');
  if (state.failedTables.has('replies')) {
    sectionEmpty(root, 'This section activates when reply tracking is running.');
    return;
  }
  if (!state.replies.length) {
    sectionEmpty(root, 'No replies pending.');
    return;
  }
  root.innerHTML = '';
  for (const r of state.replies) {
    root.appendChild(replyCard(r));
  }
}

function replyCard(r) {
  const card = document.createElement('div');
  card.className = 'card urgent';
  card.dataset.id = r.id;

  const name = [r.contact.first_name, r.contact.last_name].filter(Boolean).join(' ') || 'Contact';
  const title = r.contact.title || '';
  const company = r.company.name || '';
  const step = r.reply?.sequence_step ? ('email ' + r.reply.sequence_step) : (r.reply?.email_type || 'sequence');
  const low = (r.intent != null && r.intent < 50);

  card.innerHTML = `
    <div class="badges">
      <span class="badge badge-reply">Reply</span>
      ${intentPill(r.intent)}
    </div>
    <div class="card-title">${escapeHtml(name)}${title ? ', ' + escapeHtml(title) : ''}${company ? ' at ' + escapeHtml(company) : ''}</div>
    <div class="card-meta">${escapeHtml(timeSince(r.updated_at))} · ${escapeHtml(step)}</div>
    <div class="card-body italic">${escapeHtml(sentence(r.reply?.body_text, 200))}</div>
    <div class="card-actions">
      ${low
        ? `<button class="btn btn-primary" data-act="ack">Acknowledge</button>
           <button class="btn" data-act="nurture">Nurture</button>`
        : `<button class="btn btn-primary" data-act="reply">Reply</button>
           <button class="btn" data-act="thread">Thread</button>`}
    </div>
    <div class="composer-slot"></div>
    <div class="thread-slot"></div>
  `;

  card.querySelectorAll('.card-actions button').forEach(btn => {
    btn.addEventListener('click', () => handleReplyAction(card, r, btn.dataset.act));
  });
  return card;
}

function handleReplyAction(card, r, act) {
  if (act === 'reply') {
    openComposer(card, r);
  } else if (act === 'thread') {
    openThread(card, r);
  } else if (act === 'ack') {
    actionReply(card, r, 'acknowledged');
  } else if (act === 'nurture') {
    actionReply(card, r, 'nurture');
  }
}

function openComposer(card, r) {
  const slot = card.querySelector('.composer-slot');
  if (slot.dataset.open === '1') { slot.innerHTML = ''; slot.dataset.open = '0'; return; }
  slot.dataset.open = '1';
  slot.innerHTML = `
    <div class="composer">
      <textarea rows="4" placeholder="Write a reply">${escapeHtml(r.suggestion || '')}</textarea>
      <div class="composer-meta">
        <span><button class="btn-link" data-c="discard">Discard</button></span>
        <span class="char-count">0 chars</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-primary" data-c="send">Send</button>
        <button class="btn" data-c="save">Save draft</button>
      </div>
    </div>
  `;
  const ta = slot.querySelector('textarea');
  const cc = slot.querySelector('.char-count');
  const updateChars = () => { cc.textContent = (ta.value || '').length + ' chars'; };
  ta.addEventListener('input', updateChars);
  updateChars();

  slot.querySelector('[data-c="discard"]').addEventListener('click', () => {
    slot.innerHTML = ''; slot.dataset.open = '0';
  });
  slot.querySelector('[data-c="send"]').addEventListener('click', async () => {
    const body = ta.value.trim();
    if (!body) return;
    await sendReply(card, r, body);
  });
  slot.querySelector('[data-c="save"]').addEventListener('click', async () => {
    const body = ta.value.trim();
    if (!body) return;
    await saveReplyDraft(card, r, body);
  });
}

async function openThread(card, r) {
  const slot = card.querySelector('.thread-slot');
  if (slot.dataset.open === '1') { slot.innerHTML = ''; slot.dataset.open = '0'; return; }
  slot.dataset.open = '1';
  slot.innerHTML = '<div class="card-meta">Loading thread…</div>';
  try {
    const { data, error } = await sb
      .from('outreach_emails')
      .select('id, subject_line, body_text, created_at, sequence_step, email_type, status')
      .eq('prospect_id', r.id)
      .order('created_at', { ascending: true });
    if (error) throw error;
    if (!data || !data.length) { slot.innerHTML = '<div class="card-meta">No messages.</div>'; return; }
    slot.innerHTML = data.map(e => `
      <div class="sub-card">
        <div class="sub-card-head">${escapeHtml(e.email_type || 'email')} · ${escapeHtml(e.status || '')}</div>
        <div class="sub-card-subject">${escapeHtml(e.subject_line || '')}</div>
        <div class="sub-card-body">${escapeHtml(e.body_text || '')}</div>
        <div class="card-meta">${escapeHtml(timeSince(e.created_at))}</div>
      </div>
    `).join('');
  } catch (e) {
    slot.innerHTML = '<div class="card-meta">Could not load thread.</div>';
  }
}

async function sendReply(card, r, body) {
  try {
    const { error } = await sb.rpc('send_reply', {
      p_prospect_id: r.id,
      p_contact_id: r.contact_id,
      p_company_id: r.company_id,
      p_body: body,
    });
    if (error) throw error;
    markDone(card);
    state.actioned.add(r.id);
    state.replies = state.replies.filter(x => x.id !== r.id);
    renderStatusBar();
  } catch (e) {
    showToast('Failed. Try again.');
  }
}

async function saveReplyDraft(card, r, body) {
  try {
    const { error } = await sb.from('outreach_emails').insert({
      prospect_id: r.id,
      contact_id: r.contact_id,
      company_id: r.company_id,
      body_text: body,
      email_type: 'manual_reply',
      status: 'draft',
    });
    if (error) throw error;
    showToast('Draft saved.');
  } catch (e) {
    showToast('Failed. Try again.');
  }
}

async function actionReply(card, r, act) {
  try {
    const { error } = await sb.rpc('action_reply', { p_prospect_id: r.id, p_action: act });
    if (error) throw error;
    markDone(card);
    state.actioned.add(r.id);
    state.replies = state.replies.filter(x => x.id !== r.id);
    renderStatusBar();
  } catch (e) {
    showToast('Failed. Try again.');
  }
}

function markDone(card) {
  card.classList.add('done');
  card.querySelectorAll('button').forEach(b => {
    b.disabled = true;
    if (b.classList.contains('btn-primary')) {
      b.classList.remove('btn-primary');
      b.classList.add('btn-done');
      b.textContent = 'Done';
    }
  });
  // move to bottom of section
  const parent = card.parentElement;
  if (parent) parent.appendChild(card);
}

// Post section
function renderPost() {
  const root = document.getElementById('post-list');
  if (state.failedTables.has('linkedin_post_drafts')) {
    sectionEmpty(root, 'This section activates when Content Writer is running.');
    return;
  }
  root.innerHTML = '';
  if (!state.post) {
    root.innerHTML = '<div class="card"><div class="card-meta">No post draft for today. Content Writer agent may not have run. Check n8n.</div></div>';
    return;
  }
  root.appendChild(postCard(state.post));
}

function postCard(p) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = p.id;

  const voiceOk = p.voice_check_passed !== false;
  const preOk = p.pre_publish_check_passed !== false;
  const warnings = [];
  if (!voiceOk) warnings.push('voice check failed');
  if (!preOk) warnings.push('4-check failed');

  const chars = p.character_count != null ? p.character_count : (p.post_text ? p.post_text.length : 0);
  const meta = [
    'voice ' + (voiceOk ? 'ok' : 'fail'),
    '4-check ' + (preOk ? 'ok' : 'fail'),
    chars + ' chars',
    p.source_signal ? ('signal: ' + p.source_signal) : null,
  ].filter(Boolean).join(' · ');

  card.innerHTML = `
    <div class="badges"><span class="badge badge-post">Post</span></div>
    <div class="card-title">Ready for 8am EST</div>
    <div class="card-meta">${escapeHtml(meta)}</div>
    ${warnings.length ? `<div class="warning">${escapeHtml(warnings.join(' · '))}</div>` : ''}
    <div class="preview" data-role="preview">${escapeHtml(p.post_text || '')}</div>
    <div class="card-actions">
      <button class="btn btn-primary" data-act="approve">Approve</button>
      <button class="btn" data-act="edit">Edit</button>
      <button class="btn" data-act="swap">Swap</button>
    </div>
    <div class="edit-slot"></div>
    <div class="swap-slot"></div>
  `;

  card.querySelector('[data-act="approve"]').addEventListener('click', () => approvePost(card, p, warnings.length > 0));
  card.querySelector('[data-act="edit"]').addEventListener('click', () => openPostEdit(card, p));
  card.querySelector('[data-act="swap"]').addEventListener('click', () => openSwap(card, p));
  return card;
}

async function approvePost(card, p, needsConfirm) {
  if (needsConfirm && !card.dataset.confirming) {
    card.dataset.confirming = '1';
    const btn = card.querySelector('[data-act="approve"]');
    btn.textContent = 'Click again to confirm';
    setTimeout(() => {
      card.dataset.confirming = '';
      btn.textContent = 'Approve';
    }, 4000);
    return;
  }
  try {
    const { error } = await sb.rpc('approve_linkedin_draft', { draft_id: p.id });
    if (error) throw error;
    markDone(card);
    state.post = null;
    renderStatusBar();
  } catch (e) {
    showToast('Failed. Try again.');
  }
}

function openPostEdit(card, p) {
  const slot = card.querySelector('.edit-slot');
  if (slot.dataset.open === '1') { slot.innerHTML = ''; slot.dataset.open = '0'; return; }
  slot.dataset.open = '1';
  const preview = card.querySelector('[data-role="preview"]');
  preview.style.display = 'none';
  slot.innerHTML = `
    <textarea rows="10">${escapeHtml(p.post_text || '')}</textarea>
    <div class="card-actions">
      <button class="btn btn-primary" data-e="save">Save</button>
      <button class="btn" data-e="cancel">Cancel</button>
    </div>
  `;
  slot.querySelector('[data-e="cancel"]').addEventListener('click', () => {
    slot.innerHTML = ''; slot.dataset.open = '0'; preview.style.display = '';
  });
  slot.querySelector('[data-e="save"]').addEventListener('click', async () => {
    const newText = slot.querySelector('textarea').value;
    try {
      const { error } = await sb.rpc('update_linkedin_draft', { draft_id: p.id, new_text: newText });
      if (error) throw error;
      p.post_text = newText;
      p.voice_check_passed = false;
      p.character_count = newText.length;
      renderPost();
    } catch (e) {
      showToast('Failed. Try again.');
    }
  });
}

function openSwap(card, p) {
  const slot = card.querySelector('.swap-slot');
  if (slot.dataset.open === '1') { slot.innerHTML = ''; slot.dataset.open = '0'; return; }
  slot.dataset.open = '1';
  let alts = [];
  try {
    alts = Array.isArray(p.alternative_hooks) ? p.alternative_hooks
         : (typeof p.alternative_hooks === 'string' ? JSON.parse(p.alternative_hooks) : []);
  } catch { alts = []; }
  if (!alts.length) {
    slot.innerHTML = '<div class="card-meta">No alternative hooks available.</div>';
    return;
  }
  slot.innerHTML = alts.map((h, i) => `
    <div class="sub-card">
      <div class="sub-card-body">${escapeHtml(typeof h === 'string' ? h : (h.text || JSON.stringify(h)))}</div>
      <div class="sub-card-actions">
        <button class="btn btn-small btn-primary" data-idx="${i}">Use this hook</button>
      </div>
    </div>
  `).join('');
  slot.querySelectorAll('button[data-idx]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = parseInt(btn.dataset.idx, 10);
      try {
        const { error } = await sb.from('linkedin_post_drafts').update({
          selected_alternative_hook: idx,
          status: 'regenerate_requested',
        }).eq('id', p.id);
        if (error) throw error;
        showToast('Regeneration queued.');
      } catch (e) {
        showToast('Failed. Try again.');
      }
    });
  });
}

// Outreach section
function renderOutreach() {
  const root = document.getElementById('outreach-list');
  if (REVIEW_LEVEL >= 3) { root.innerHTML = ''; document.getElementById('sec-outreach').style.display = 'none'; return; }
  if (state.failedTables.has('outreach')) {
    sectionEmpty(root, 'This section activates when Outreach Drafter is running.');
    return;
  }
  if (!state.outreach.length) {
    sectionEmpty(root, 'No outreach drafts pending. Prospect Researcher runs at 00:01, Outreach Drafter at 02:00.');
    return;
  }
  root.innerHTML = '';
  for (const p of state.outreach) {
    root.appendChild(outreachCard(p));
  }
}

function outreachCard(p) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = p.id;

  const name = [p.contact.first_name, p.contact.last_name].filter(Boolean).join(' ') || 'Contact';
  const title = p.contact.title || '';
  const company = p.company.name || '';
  const employees = p.employee_count ? p.employee_count + ' employees' : null;
  const tLo = p.turnover_estimate_low, tHi = p.turnover_estimate_high;
  const turnover = (tLo != null && tHi != null) ? ('$' + shortMoney(tLo) + '–$' + shortMoney(tHi)) : null;
  const meta = [
    p.icp_score != null ? ('ICP ' + p.icp_score) : null,
    p.sector,
    employees,
    turnover,
    p.emails.length + ' drafts ready',
  ].filter(Boolean).join(' · ');

  card.innerHTML = `
    <div class="card-check">
      <span class="check-box" data-role="check"></span>
      <div style="flex:1;min-width:0">
        <div class="badges"><span class="badge badge-outreach">Sequence</span></div>
        <div class="card-title">${escapeHtml(name)}${title ? ', ' + escapeHtml(title) : ''}${company ? ' at ' + escapeHtml(company) : ''}</div>
        <div class="card-meta">${escapeHtml(meta)}</div>
        <div class="card-actions">
          <button class="btn btn-primary" data-act="review">Review</button>
          <button class="btn" data-act="approve-all">Approve all</button>
        </div>
        <div class="review-slot"></div>
      </div>
    </div>
  `;

  const check = card.querySelector('[data-role="check"]');
  check.addEventListener('click', () => toggleSelect(p.id, check));
  card.querySelector('[data-act="review"]').addEventListener('click', () => openReview(card, p));
  card.querySelector('[data-act="approve-all"]').addEventListener('click', () => approveAllSequence(card, p));
  return card;
}

function shortMoney(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1e3) return Math.round(n / 1e3) + 'K';
  return String(n);
}

function toggleSelect(id, el) {
  if (state.selectedProspects.has(id)) {
    state.selectedProspects.delete(id);
    el.classList.remove('on');
  } else {
    state.selectedProspects.add(id);
    el.classList.add('on');
  }
  const bar = document.getElementById('floating-bar');
  const n = state.selectedProspects.size;
  document.getElementById('selected-count').textContent = n + ' selected';
  bar.style.display = n > 0 ? 'flex' : 'none';
}

function openReview(card, p) {
  const slot = card.querySelector('.review-slot');
  if (slot.dataset.open === '1') { slot.innerHTML = ''; slot.dataset.open = '0'; return; }
  slot.dataset.open = '1';

  let emails = p.emails;
  if (REVIEW_LEVEL === 2) emails = emails.filter(e => (e.sequence_step || 1) <= 1);

  slot.innerHTML = emails.map(e => subCard(e, p.id)).join('') +
    `<div class="card-actions">
       <button class="btn btn-primary" data-bulk="1">Approve all</button>
       <button class="btn-link" data-collapse="1">Collapse</button>
     </div>`;

  slot.querySelectorAll('[data-email-id]').forEach(el => {
    const eid = el.dataset.emailId;
    el.querySelector('[data-e-act="approve"]').addEventListener('click', () => approveEmail(el, eid));
    el.querySelector('[data-e-act="edit"]').addEventListener('click', () => editEmail(el, eid));
    el.querySelector('[data-e-act="skip"]').addEventListener('click', () => skipEmail(el, eid));
  });
  slot.querySelector('[data-bulk]').addEventListener('click', () => approveAllSequence(card, p));
  slot.querySelector('[data-collapse]').addEventListener('click', () => { slot.innerHTML = ''; slot.dataset.open = '0'; });
}

function subCard(e, prospectId) {
  const label = e.email_type === 'linkedin_connection' ? 'LinkedIn connection'
              : e.email_type === 'breakup' ? 'Breakup'
              : ('Email ' + (e.sequence_step || '?') + (e.day_offset != null ? ' (day ' + e.day_offset + ')' : ''));
  return `
    <div class="sub-card" data-email-id="${escapeHtml(e.id)}">
      <div class="sub-card-head">${escapeHtml(label)}</div>
      ${e.subject_line ? `<div class="sub-card-subject">${escapeHtml(e.subject_line)}</div>` : ''}
      <div class="sub-card-body" data-role="body">${escapeHtml(e.body_text || '')}</div>
      <div class="sub-card-actions">
        <button class="btn btn-small btn-primary" data-e-act="approve">Approve</button>
        <button class="btn btn-small" data-e-act="edit">Edit</button>
        <button class="btn btn-small" data-e-act="skip">Skip</button>
      </div>
    </div>
  `;
}

async function approveEmail(el, eid) {
  try {
    const { error } = await sb.rpc('approve_outreach_email', { email_id: eid });
    if (error) throw error;
    el.style.opacity = '0.45';
    el.querySelectorAll('button').forEach(b => b.disabled = true);
  } catch { showToast('Failed. Try again.'); }
}

function editEmail(el, eid) {
  const body = el.querySelector('[data-role="body"]');
  if (el.dataset.editing === '1') return;
  el.dataset.editing = '1';
  const original = body.textContent;
  body.outerHTML = `<textarea rows="6" style="margin-bottom:8px">${escapeHtml(original)}</textarea>`;
  const actions = el.querySelector('.sub-card-actions');
  actions.innerHTML = `
    <button class="btn btn-small btn-primary" data-e-act="save-edit">Save</button>
    <button class="btn btn-small" data-e-act="cancel-edit">Cancel</button>
  `;
  actions.querySelector('[data-e-act="save-edit"]').addEventListener('click', async () => {
    const v = el.querySelector('textarea').value;
    try {
      const { error } = await sb.from('outreach_emails').update({ body_text: v }).eq('id', eid);
      if (error) throw error;
      showToast('Saved.');
      location.reload();
    } catch { showToast('Failed. Try again.'); }
  });
  actions.querySelector('[data-e-act="cancel-edit"]').addEventListener('click', () => location.reload());
}

async function skipEmail(el, eid) {
  try {
    const { error } = await sb.from('outreach_emails').update({ status: 'skipped' }).eq('id', eid);
    if (error) throw error;
    el.style.opacity = '0.45';
    el.querySelectorAll('button').forEach(b => b.disabled = true);
  } catch { showToast('Failed. Try again.'); }
}

async function approveAllSequence(card, p) {
  try {
    const { error } = await sb.rpc('approve_outreach_sequence', { p_prospect_id: p.id });
    if (error) throw error;
    markDone(card);
    state.outreach = state.outreach.filter(x => x.id !== p.id);
    state.selectedProspects.delete(p.id);
    document.getElementById('selected-count').textContent = state.selectedProspects.size + ' selected';
    document.getElementById('floating-bar').style.display = state.selectedProspects.size > 0 ? 'flex' : 'none';
    renderStatusBar();
  } catch { showToast('Failed. Try again.'); }
}

async function approveSelected() {
  const ids = Array.from(state.selectedProspects);
  for (const id of ids) {
    const card = document.querySelector('#outreach-list .card[data-id="' + id + '"]');
    const p = state.outreach.find(x => x.id === id);
    if (card && p) await approveAllSequence(card, p);
  }
}

function setRealtimeIndicator(live) {
  state.realtime = live;
  const dot = document.getElementById('rt-dot');
  dot.classList.remove('live', 'poll');
  dot.classList.add(live ? 'live' : 'poll');
  dot.title = live ? 'Live' : 'Polling';
}

function subscribeRealtime() {
  try {
    const ch = sb.channel('cc-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'outreach_prospects' }, () => refresh('replies'))
      .on('postgres_changes', { event: '*', schema: 'public', table: 'linkedin_post_drafts' }, () => refresh('post'))
      .on('postgres_changes', { event: '*', schema: 'public', table: 'outreach_emails' }, () => refresh('replies'))
      .subscribe((status) => {
        setRealtimeIndicator(status === 'SUBSCRIBED');
      });
    return ch;
  } catch {
    setRealtimeIndicator(false);
    return null;
  }
}

async function refresh(which) {
  if (!which || which === 'replies') {
    const d = await fetchReplies();
    if (d) {
      const prev = new Set(state.replies.map(x => x.id));
      const next = d.filter(x => !state.actioned.has(x.id));
      state.replies = next;
      renderReplies();
      renderStatusBar();
      // Flash new ones
      next.forEach(r => {
        if (!prev.has(r.id)) {
          const el = document.querySelector('#replies-list .card[data-id="' + r.id + '"]');
          if (el) el.classList.add('new-flash');
        }
      });
    }
  }
  if (!which || which === 'post') {
    const p = await fetchPost();
    state.post = p && !state.actioned.has(p.id) ? p : null;
    renderPost();
    renderStatusBar();
  }
  if (!which || which === 'outreach') {
    const o = await fetchOutreach();
    if (o) { state.outreach = o.filter(x => !state.actioned.has(x.id)); renderOutreach(); renderStatusBar(); }
  }
  if (!which || which === 'other') {
    const m = await fetchOther();
    if (m) { state.other = m.filter(x => !state.actioned.has(x.id)); renderOther(); renderStatusBar(); }
  }
  if (!which) {
    const o = await fetchOvernight();
    if (o) { state.overnight = o; renderFooter(); }
  }
}

// ============================================================
// BOOT
// ============================================================
async function boot() {
  updateHeader();
  setInterval(updateHeader, 60000);

  if (SUPABASE_ANON_KEY === 'PASTE_YOUR_SUPABASE_ANON_KEY_HERE') {
    document.getElementById('app').style.display = 'none';
    document.getElementById('error-screen').style.display = 'block';
    document.getElementById('error-screen').querySelector('h2').textContent = 'Missing Supabase anon key.';
    document.getElementById('error-screen').querySelector('p').textContent = 'Paste it into SUPABASE_ANON_KEY in command-center.html.';
    return;
  }

  if (!hasSession()) { showAuth(); return; }

  document.getElementById('app').style.display = 'block';

  try {
    await refresh();
  } catch (e) {
    document.getElementById('app').style.display = 'none';
    document.getElementById('error-screen').style.display = 'block';
    return;
  }

  subscribeRealtime();
  setInterval(() => { if (!state.realtime) refresh(); }, POLL_MS);

  document.getElementById('approve-selected').addEventListener('click', approveSelected);
}

boot();
</script>
