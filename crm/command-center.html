<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clover ERA Command Center</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #46AEB8;
  --coral: #E07A5F;
  --dark: #0A0A0A;
  --bg-primary: #FFFFFF;
  --bg-secondary: #F8F7F2;
  --border: rgba(0,0,0,0.08);
  --text-primary: #0A0A0A;
  --text-secondary: #6B7280;
  --text-meta: #9CA3AF;
  --blue: #3B82F6;
  --amber: #F59E0B;
  --green: #22C55E;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 400;
  color: var(--text-primary);
  background: var(--bg-secondary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* AUTH GATE */
#auth-gate {
  position: fixed; inset: 0;
  background: var(--bg-primary);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
#auth-gate.hidden { display: none; }
.hidden { display: none !important; }
.auth-box {
  text-align: center;
  max-width: 320px;
  width: 100%;
  padding: 2rem;
}
.auth-box h1 {
  font-size: 18px; font-weight: 500;
  margin-bottom: 0.25rem;
}
.auth-box p {
  color: var(--text-secondary);
  margin-bottom: 1.5rem;
  font-size: 13px;
}
.auth-box input {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 14px;
  outline: none;
  margin-bottom: 0.75rem;
}
.auth-box input:focus { border-color: var(--teal); }
.auth-box .auth-btn {
  width: 100%;
  padding: 0.75rem;
  background: var(--teal);
  color: white;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.auth-box .auth-btn:hover { opacity: 0.9; }
.auth-error {
  color: var(--coral);
  font-size: 12px;
  margin-top: 0.5rem;
  min-height: 1.2em;
}

/* MAIN APP */
#app { display: none; }
#app.visible { display: block; }

/* HEADER */
header {
  background: var(--bg-primary);
  border-bottom: 0.5px solid var(--border);
  padding: 0.75rem 1.25rem;
  position: sticky; top: 0; z-index: 100;
}
.header-row {
  display: flex; align-items: center; justify-content: space-between;
  max-width: 1200px; margin: 0 auto;
}
.header-left h1 {
  font-size: 18px; font-weight: 500; color: var(--text-primary);
}
.header-right {
  display: flex; align-items: center; gap: 1rem;
  font-size: 12px; color: var(--text-meta);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  margin-right: 4px;
}
.updated-label { color: var(--text-meta); font-size: 11px; }

/* NAV TABS */
.nav-tabs {
  background: var(--bg-primary);
  border-bottom: 0.5px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }
.nav-inner {
  display: flex; gap: 0;
  max-width: 1200px; margin: 0 auto;
  padding: 0 1.25rem;
}
.nav-tab {
  padding: 0.625rem 1rem;
  font-size: 13px; font-weight: 400;
  color: var(--text-secondary);
  background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
  transition: color 0.15s;
}
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active {
  color: var(--teal);
  border-bottom-color: var(--teal);
  font-weight: 500;
}
.nav-tab.disabled {
  color: var(--text-meta);
  cursor: default;
  opacity: 0.5;
}
.nav-tab.disabled:hover { color: var(--text-meta); }

/* MAIN CONTENT */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 1.25rem;
}

/* METRICS ROW */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.metric-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  transition: box-shadow 0.2s;
}
.metric-card.pulse {
  animation: metric-pulse 0.6s ease-out;
}
@keyframes metric-pulse {
  0% { box-shadow: 0 0 0 0 rgba(70,174,184,0.3); }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.metric-label {
  font-size: 12px; color: var(--text-meta); font-weight: 400;
  margin-bottom: 0.25rem;
}
.metric-value {
  font-size: 24px; font-weight: 500; color: var(--text-primary);
}

/* CARDS */
.card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.625rem;
  transition: box-shadow 0.15s;
}
.card:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.card.urgent { border-left: 2px solid var(--coral); }

.card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 0.375rem;
}
.card-badge {
  font-size: 11px; font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}
.badge-reply { background: rgba(224,122,95,0.1); color: var(--coral); }
.badge-linkedin { background: rgba(59,130,246,0.1); color: var(--blue); }
.badge-outreach { background: rgba(70,174,184,0.1); color: var(--teal); }
.badge-mgi { background: rgba(245,158,11,0.1); color: var(--amber); }

.card-time { font-size: 12px; color: var(--text-meta); }

.card-title {
  font-size: 14px; font-weight: 500; color: var(--text-primary);
  margin-bottom: 0.125rem;
}
.card-desc {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 0.375rem;
}
.card-preview {
  font-size: 12px; color: var(--text-meta);
  margin-bottom: 0.75rem;
  line-height: 1.4;
}
.card-actions {
  display: flex; gap: 0.5rem; justify-content: flex-end;
  flex-wrap: wrap;
}

/* BUTTONS */
.btn {
  font-family: var(--font);
  font-size: 13px; font-weight: 500;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  min-height: 36px;
  display: inline-flex; align-items: center; gap: 0.375rem;
  transition: opacity 0.15s, background 0.15s;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
  background: var(--teal); color: white;
}
.btn-primary:hover:not(:disabled) { opacity: 0.9; }
.btn-secondary {
  background: var(--bg-secondary); color: var(--text-primary);
  border: 0.5px solid var(--border);
}
.btn-secondary:hover:not(:disabled) { background: #EEEDE8; }
.btn-danger {
  background: rgba(224,122,95,0.1); color: var(--coral);
}
.btn-danger:hover:not(:disabled) { background: rgba(224,122,95,0.18); }
.btn-sm { padding: 0.375rem 0.75rem; font-size: 12px; min-height: 30px; }
.btn-icon {
  background: none; border: none; cursor: pointer; padding: 0.25rem;
  color: var(--text-meta); font-size: 16px;
}
.btn-icon:hover { color: var(--text-primary); }

/* EXPANDABLE SECTIONS */
.expandable-toggle {
  font-size: 12px; color: var(--teal); cursor: pointer;
  background: none; border: none; font-family: var(--font);
  padding: 0.25rem 0;
  display: inline-flex; align-items: center; gap: 0.25rem;
}
.expandable-toggle:hover { text-decoration: underline; }
.expandable-content { display: none; margin-top: 0.5rem; }
.expandable-content.open { display: block; }

/* POST TEXT BOX */
.post-text-box {
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-size: 13px;
  line-height: 1.5;
  color: var(--text-primary);
  margin: 0.5rem 0;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
  cursor: pointer;
  position: relative;
}
.post-text-box:hover::after {
  content: 'Click to copy';
  position: absolute; top: 4px; right: 8px;
  font-size: 10px; color: var(--text-meta);
  background: var(--bg-primary);
  padding: 2px 6px; border-radius: 4px;
}

.check-badges {
  display: flex; gap: 0.5rem; margin: 0.5rem 0;
  flex-wrap: wrap;
}
.check-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
}
.check-pass { background: rgba(34,197,94,0.1); color: #16a34a; }
.check-fail { background: rgba(224,122,95,0.1); color: var(--coral); }
.check-neutral { background: var(--bg-secondary); color: var(--text-meta); }

/* EMAIL ROW */
.email-row {
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 0.625rem 0.75rem;
  margin-bottom: 0.375rem;
  display: flex; flex-direction: column; gap: 0.25rem;
}
.email-row-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.5rem;
}
.email-step-badge {
  font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 3px;
  background: var(--bg-secondary); color: var(--text-secondary);
  min-width: 24px; text-align: center;
}
.email-subject { font-size: 13px; font-weight: 500; flex: 1; }
.email-row-actions { display: flex; gap: 0.25rem; }
.email-body-expand {
  font-size: 12px; color: var(--text-secondary);
  line-height: 1.4;
  margin-top: 0.25rem;
  white-space: pre-wrap;
}

/* REPLY INBOX */
.reply-layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0.75rem;
  min-height: 500px;
}
.reply-list {
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-primary);
  overflow-y: auto;
  max-height: 70vh;
}
.reply-item {
  padding: 0.75rem 1rem;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.reply-item:hover { background: var(--bg-secondary); }
.reply-item.active { background: rgba(70,174,184,0.06); border-left: 2px solid var(--teal); }
.reply-item.unread .reply-item-name { font-weight: 500; }
.reply-item-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.125rem;
}
.reply-item-name { font-size: 13px; font-weight: 400; }
.reply-item-time { font-size: 11px; color: var(--text-meta); }
.reply-item-company { font-size: 12px; color: var(--text-secondary); }
.reply-item-snippet { font-size: 12px; color: var(--text-meta); margin-top: 0.25rem; }
.intent-pill {
  font-size: 10px; font-weight: 500;
  padding: 1px 6px; border-radius: 10px;
  display: inline-block; margin-left: 0.375rem;
}
.intent-high { background: rgba(34,197,94,0.12); color: #16a34a; }
.intent-med { background: rgba(245,158,11,0.12); color: #d97706; }
.intent-low { background: var(--bg-secondary); color: var(--text-meta); }

.reply-detail {
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-primary);
  padding: 1.25rem;
  overflow-y: auto;
  max-height: 70vh;
}
.reply-detail-placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--text-meta); font-size: 13px;
}
.reply-detail h3 {
  font-size: 14px; font-weight: 500; margin-bottom: 0.125rem;
}
.reply-detail .detail-company {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 1rem;
}
.detail-section {
  margin-bottom: 1rem;
}
.detail-section-title {
  font-size: 12px; font-weight: 500; color: var(--text-meta);
  text-transform: uppercase; letter-spacing: 0.03em;
  margin-bottom: 0.375rem;
}
.detail-text {
  font-size: 13px; line-height: 1.5;
  background: var(--bg-secondary);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  white-space: pre-wrap;
}
.detail-context {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.375rem;
  font-size: 12px;
}
.detail-context dt { color: var(--text-meta); }
.detail-context dd { color: var(--text-primary); font-weight: 500; }

/* SKELETON */
.skeleton-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 0.625rem;
}
.skeleton-line {
  height: 12px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.5s infinite;
  border-radius: 4px;
  margin-bottom: 0.5rem;
}
.skeleton-line.w40 { width: 40%; }
.skeleton-line.w60 { width: 60%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.w100 { width: 100%; }
.skeleton-line.h20 { height: 20px; }
@keyframes skeleton-shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-meta);
}
.empty-state svg { margin-bottom: 0.75rem; }
.empty-state p { font-size: 13px; }

/* ERROR PAGE */
.error-page {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg-primary);
  align-items: center; justify-content: center;
  z-index: 9998;
  flex-direction: column; gap: 1rem;
  text-align: center; padding: 2rem;
}
.error-page.visible { display: flex; }
.error-page p { color: var(--text-secondary); font-size: 14px; max-width: 400px; }

/* TOASTS */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column-reverse; gap: 0.5rem;
  z-index: 10000;
  pointer-events: none;
}
.toast {
  background: #1f2937; color: white;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  font-size: 13px;
  font-family: var(--font);
  pointer-events: auto;
  animation: toast-in 0.2s ease-out;
  max-width: 360px;
}
.toast.toast-error { background: #991b1b; }
@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MOBILE */
@media (max-width: 700px) {
  .metrics-row { grid-template-columns: 1fr 1fr; }
  .reply-layout { grid-template-columns: 1fr; }
  .reply-detail { max-height: none; }
  .reply-list { max-height: 40vh; }
  .btn { min-height: 44px; }
  .card { padding: 0.875rem 1rem; }
  header { padding: 0.625rem 1rem; }
  .main-content { padding: 0.75rem 1rem; }
  .header-right .datetime { display: none; }
}
</style>
</head>

    <form id="auth-form">
      <input type="password" id="auth-input" placeholder="Password" autocomplete="current-password" autofocus>

<!-- MAIN APP -->
<div id="app">

    <!-- VIEW: TODAY'S ACTIONS -->
    <div id="view-actions">
      <div id="actions-skeleton">

    <!-- VIEW: SIGNAL FEED -->
    <div id="view-signals" style="display:none">
      <div id="signals-skeleton">
        <div class="skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
        <div class="skeleton-card"><div class="skeleton-line w80"></div><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>

      </div>
      <div id="signals-items"></div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
}

const authGate = document.getElementById('auth-gate');
const authForm = document.getElementById('auth-form');
const authInput = document.getElementById('auth-input');
const authError = document.getElementById('auth-error');
const app = document.getElementById('app');

function checkAuth() {
  if (localStorage.getItem('cc-auth') === PASSWORD_HASH) {
    authGate.classList.add('hidden');
    app.classList.add('visible');
    return true;
  }
  return false;
}

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const hash = await hashPassword(authInput.value);
  if (hash === PASSWORD_HASH) {
    localStorage.setItem('cc-auth', PASSWORD_HASH);
    authGate.classList.add('hidden');
    app.classList.add('visible');
    initApp();
  } else {
    authError.textContent = 'Incorrect password';
    authInput.value = '';
    authInput.focus();
  }
});

function showErrorPage() {
  document.getElementById('error-page').classList.add('visible');
  app.classList.remove('visible');
}

function toast(msg, isError = false) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' toast-error' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.remove(); }, TOAST_DURATION);
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  const d = new Date(dateStr);
  const diffMs = now - d;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'yesterday';
  return days + 'd ago';
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function oneDayAgoISO() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.toISOString();
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '...' : str;
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function safeQuery(queryFn) {
  try {
    const result = await queryFn();
    if (result.error) {
      // Table might not exist
      if (result.error.code === '42P01' || result.error.message?.includes('does not exist')) {
        console.warn('Table not found:', result.error.message);
        return { data: [], error: null };
      }
      console.warn('Query error:', result.error);
      return { data: [], error: result.error };
    }
    return result;
  } catch (e) {
    console.warn('Query exception:', e);
    return { data: [], error: e };
  }
}

async function loadData() {
  const today = todayISO();
  const dayAgo = oneDayAgoISO();

  const [linkedinRes, emailsRes, repliedRes, companiesRes, prospectsRes] = await Promise.all([
    safeQuery(() => supabase.from('linkedin_post_drafts').select('*').eq('post_date', today).in('status', ['draft', 'needs_rewrite'])),
    safeQuery(() => supabase.from('outreach_emails').select('*').eq('status', 'draft')),
    safeQuery(() => supabase.from('outreach_prospects').select('*').eq('status', 'replied')),
    safeQuery(() => supabase.from('companies').select('id').gte('created_at', dayAgo)),
    safeQuery(() => supabase.from('outreach_prospects').select('status')),
  ]);

  // Check for total failure (Supabase unreachable)
  const allFailed = [linkedinRes, emailsRes, repliedRes].every(r => r.error && !r.data?.length);
  if (allFailed && !lastRefresh) {
    showErrorPage();
    return;
  }

  cachedData.linkedinDrafts = linkedinRes.data || [];
  cachedData.outreachEmails = emailsRes.data || [];
  cachedData.repliedProspects = repliedRes.data || [];
  cachedData.recentCompanyCount = (companiesRes.data || []).length;
  cachedData.allProspects = prospectsRes.data || [];

  // Fetch prospect details for outreach emails
  const prospectIds = [...new Set((cachedData.outreachEmails || []).map(e => e.prospect_id).filter(Boolean))];
  if (prospectIds.length > 0) {
    const { data: prospects } = await safeQuery(() =>
      supabase.from('outreach_prospects').select('*').in('id', prospectIds)
    );
    cachedData.prospectDetails = {};
    (prospects || []).forEach(p => { cachedData.prospectDetails[p.id] = p; });
  }

  lastRefresh = new Date();
  updateRefreshLabel();
  updateMetrics();
  if (currentView === 'actions') renderActions();
}

function updateMetrics() {
  const emailsByProspect = groupBy(cachedData.outreachEmails, 'prospect_id');
  const reviewCount = cachedData.linkedinDrafts.length + Object.keys(emailsByProspect).length;
  const repliesCount = cachedData.repliedProspects.length;

  setMetric('metric-review-val', reviewCount);
  setMetric('metric-replies-val', repliesCount);
  setMetric('metric-prospects-val', cachedData.recentCompanyCount);
  // Pipeline value placeholder
  document.getElementById('metric-pipeline-val').textContent = '$--';
}

function setMetric(id, value) {
  const el = document.getElementById(id);
  const prev = el.textContent;
  el.textContent = value;
  if (prev !== '--' && prev !== String(value)) {
    el.closest('.metric-card').classList.add('pulse');
    setTimeout(() => el.closest('.metric-card').classList.remove('pulse'), 600);
  }
}

function groupBy(arr, key) {
  const map = {};
  (arr || []).forEach(item => {
    const k = item[key];
    if (!map[k]) map[k] = [];
    map[k].push(item);
  });
  return map;
}

function renderActions() {
  const skeleton = document.getElementById('actions-skeleton');
  const list = document.getElementById('actions-list');
  skeleton.style.display = 'none';

  const items = [];

  // Replies
  cachedData.repliedProspects.forEach(p => {
    items.push({
      type: 'reply',
      urgency: 90,
      id: p.id,
      name: p.contact_name || p.first_name || 'Unknown contact',
      company: p.company_name || '',
      desc: 'Reply received, needs review',
      preview: truncate(p.reply_text || p.notes || '', 150),
      time: p.updated_at || p.created_at,
      data: p,
    });
  });

  // LinkedIn drafts
  const now = new Date();
  const isPastPublish = now.getUTCHours() >= 7;
  cachedData.linkedinDrafts.forEach(d => {
    items.push({
      type: 'linkedin',
      urgency: isPastPublish ? 85 : 70,
      id: d.id,
      name: 'LinkedIn post',
      company: d.post_date,
      desc: 'Draft ready for review',
      preview: truncate(d.post_text || '', 150),
      time: d.created_at,
      data: d,
    });
  });

  // Outreach emails grouped by prospect
  const emailsByProspect = groupBy(cachedData.outreachEmails, 'prospect_id');
  Object.entries(emailsByProspect).forEach(([prospectId, emails]) => {
    const prospect = cachedData.prospectDetails[prospectId] || {};
    items.push({
      type: 'outreach',
      urgency: 50,
      id: prospectId,
      name: prospect.contact_name || prospect.first_name || 'Prospect',
      company: prospect.company_name || '',
      desc: `${emails.length} email${emails.length > 1 ? 's' : ''} pending review`,
      preview: truncate(emails[0]?.subject || '', 150),
      time: emails[0]?.created_at,
      data: { prospect, emails },
    });
  });

  items.sort((a, b) => b.urgency - a.urgency);

  if (items.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="32" height="32" fill="none" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4" stroke="#46AEB8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" stroke="#46AEB8" stroke-width="1.5"/></svg>
        <p>All caught up. Next prospect research runs at 00:01 UTC.</p>
      </div>`;
    return;
  }

  list.innerHTML = items.map(item => renderActionCard(item)).join('');
  attachActionHandlers();
}

function renderActionCard(item) {
  const badgeClass = {
    reply: 'badge-reply', linkedin: 'badge-linkedin',
    outreach: 'badge-outreach', mgi: 'badge-mgi'
  }[item.type];
  const badgeLabel = {
    reply: 'Reply', linkedin: 'LinkedIn',
    outreach: 'Outreach', mgi: 'MGI'
  }[item.type];
  const isUrgent = item.type === 'reply';

  let body = '';
  if (item.type === 'linkedin') body = renderLinkedinCard(item);
  else if (item.type === 'outreach') body = renderOutreachCard(item);
  else if (item.type === 'reply') body = renderReplyCard(item);

  return `
    <div class="card ${isUrgent ? 'urgent' : ''}" data-type="${item.type}" data-id="${item.id}">
      <div class="card-header">
        <span class="card-badge ${badgeClass}">${badgeLabel}</span>
        <span class="card-time">${timeAgo(item.time)}</span>
      </div>
      <div class="card-title">${escapeHtml(item.name)}${item.company ? ' at ' + escapeHtml(item.company) : ''}</div>
      <div class="card-desc">${escapeHtml(item.desc)}</div>
      ${body}
    </div>`;
}

function renderLinkedinCard(item) {
  const d = item.data;
  const voiceCheck = d.voice_check_passed;
  const prePublish = d.pre_publish_check_passed;
  let hooks = '';
  if (d.alternative_hooks) {
    let parsed;
    try { parsed = typeof d.alternative_hooks === 'string' ? JSON.parse(d.alternative_hooks) : d.alternative_hooks; } catch(e) { parsed = null; }
    if (parsed && Array.isArray(parsed) && parsed.length) {
      hooks = `
        <button class="expandable-toggle" data-expand="hooks-${d.id}">Show alt hooks</button>
        <div class="expandable-content" id="hooks-${d.id}">
          ${parsed.map((h, i) => `<div style="font-size:12px;color:var(--text-secondary);margin-bottom:0.25rem;">${i + 1}. ${escapeHtml(typeof h === 'string' ? h : JSON.stringify(h))}</div>`).join('')}
        </div>`;
    }
  }
  let imgDesc = '';
  if (d.image_description) {
    imgDesc = `
      <button class="expandable-toggle" data-expand="img-${d.id}">Image description</button>
      <div class="expandable-content" id="img-${d.id}">
        <div style="font-size:12px;color:var(--text-secondary);">${escapeHtml(d.image_description)}</div>
      </div>`;
  }

  return `
    <div class="post-text-box" data-copy="${escapeHtml(d.post_text || '')}" onclick="this.dispatchEvent(new CustomEvent('copytext',{bubbles:true}))">${escapeHtml(d.post_text || '')}</div>
    <div class="check-badges">
      <span class="check-badge ${voiceCheck ? 'check-pass' : voiceCheck === false ? 'check-fail' : 'check-neutral'}">Voice check ${voiceCheck ? 'passed' : voiceCheck === false ? 'failed' : 'n/a'}</span>
      <span class="check-badge ${prePublish ? 'check-pass' : prePublish === false ? 'check-fail' : 'check-neutral'}">Pre-publish ${prePublish ? 'passed' : prePublish === false ? 'failed' : 'n/a'}</span>
      <span class="check-badge check-neutral">${d.character_count || 0} chars</span>
      <span class="check-badge check-neutral">${d.word_count || 0} words</span>
    </div>
    ${hooks}
    ${imgDesc}
    <div class="card-actions">
      <button class="btn btn-secondary btn-sm" data-action="copy-post" data-post-text="${escapeHtml(d.post_text || '')}">Copy post</button>
      <button class="btn btn-danger btn-sm" data-action="linkedin-rewrite" data-draft-id="${d.id}">Needs rewrite</button>
      <button class="btn btn-primary btn-sm" data-action="linkedin-approve" data-draft-id="${d.id}">Approve</button>
    </div>`;
}

function renderOutreachCard(item) {
  const { prospect, emails } = item.data;
  const sorted = [...emails].sort((a, b) => (a.position || 0) - (b.position || 0));
  const segment = prospect.segment || prospect.title || '';

  return `
    <div style="margin-bottom:0.5rem;">
      ${segment ? `<span class="check-badge check-neutral" style="margin-right:0.25rem;">${escapeHtml(segment)}</span>` : ''}
    </div>
    <div class="expandable-content open" id="emails-${item.id}">
      ${sorted.map(em => renderEmailRow(em)).join('')}
    </div>
    <div class="card-actions">
      <button class="btn btn-secondary btn-sm" data-action="skip-prospect" data-prospect-id="${item.id}">Skip prospect</button>
      <button class="btn btn-primary btn-sm" data-action="approve-all-emails" data-prospect-id="${item.id}">Approve all</button>
    </div>`;
}

function renderEmailRow(em) {
  const step = STEP_LABELS[em.position] || `S${em.position}`;
  return `
    <div class="email-row" data-email-id="${em.id}">
      <div class="email-row-header">
        <span class="email-step-badge">${step}</span>
        <span class="email-subject">${escapeHtml(em.subject || '(no subject)')}</span>
        <div class="email-row-actions">
          <button class="btn btn-sm btn-primary" data-action="approve-email" data-email-id="${em.id}" title="Approve" style="padding:0.25rem 0.5rem;">&#10003;</button>
          <button class="btn btn-sm btn-danger" data-action="reject-email" data-email-id="${em.id}" title="Reject" style="padding:0.25rem 0.5rem;">&#10005;</button>
        </div>
      </div>
      <button class="expandable-toggle" data-expand="email-body-${em.id}">Show body</button>
      <div class="expandable-content" id="email-body-${em.id}">
        <div class="email-body-expand">${escapeHtml(em.body || '')}</div>
        ${em.personalization_notes ? `<div style="font-size:11px;color:var(--text-meta);margin-top:0.25rem;">Personalization: ${escapeHtml(em.personalization_notes)}</div>` : ''}
      </div>
    </div>`;
}

function renderReplyCard(item) {
  const p = item.data;
  return `
    <div class="card-preview">${escapeHtml(item.preview)}</div>
    <button class="expandable-toggle" data-expand="reply-full-${p.id}">View full reply</button>
    <div class="expandable-content" id="reply-full-${p.id}">
      <div class="detail-text">${escapeHtml(p.reply_text || p.notes || 'No reply text available')}</div>
    </div>
    <div class="card-actions">
      <button class="btn btn-primary btn-sm" data-action="mark-handled" data-prospect-id="${p.id}">Mark handled</button>
    </div>`;
}

// ============================================================
// ACTION HANDLERS
// ============================================================
function attachActionHandlers() {
  // Expandable toggles
  document.querySelectorAll('.expandable-toggle').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const targetId = btn.dataset.expand;
      const target = document.getElementById(targetId);
      if (target) target.classList.toggle('open');
    });
  });

  // Copy text from post box
  document.querySelectorAll('.post-text-box').forEach(box => {
    box.addEventListener('copytext', async () => {
      try {
        await navigator.clipboard.writeText(box.dataset.copy || box.textContent);
        toast('Copied to clipboard');
      } catch(e) {
        toast('Copy failed', true);
      }
    });
  });

  // Button actions
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      btn.disabled = true;

      try {
        switch (action) {
          case 'copy-post': {
            await navigator.clipboard.writeText(btn.dataset.postText || '');
            toast('Copied to clipboard');
            break;
          }
          case 'linkedin-approve': {
            const { error } = await supabase.from('linkedin_post_drafts')
              .update({ status: 'approved', published_at: new Date().toISOString() })
              .eq('id', btn.dataset.draftId);
            if (error) throw error;
            toast('LinkedIn draft approved');
            removeCard(btn);
            break;
          }
          case 'linkedin-rewrite': {
            const { error } = await supabase.from('linkedin_post_drafts')
              .update({ status: 'needs_rewrite' })
              .eq('id', btn.dataset.draftId);
            if (error) throw error;
            toast('Marked for rewrite');
            removeCard(btn);
            break;
          }
          case 'approve-email': {
            const { error } = await supabase.from('outreach_emails')
              .update({ status: 'approved' })
              .eq('id', btn.dataset.emailId);
            if (error) throw error;
            toast('Email approved');
            const row = btn.closest('.email-row');
            if (row) row.style.opacity = '0.4';
            btn.disabled = true;
            break;
          }
          case 'reject-email': {
            const { error } = await supabase.from('outreach_emails')
              .update({ status: 'rejected' })
              .eq('id', btn.dataset.emailId);
            if (error) throw error;
            toast('Email rejected');
            const row = btn.closest('.email-row');
            if (row) row.style.opacity = '0.4';
            btn.disabled = true;
            break;
          }
          case 'approve-all-emails': {
            const { error } = await supabase.from('outreach_emails')
              .update({ status: 'approved' })
              .eq('prospect_id', btn.dataset.prospectId)
              .eq('status', 'draft');
            if (error) throw error;
            toast('All emails approved');
            removeCard(btn);
            break;
          }
          case 'skip-prospect': {
            const { error } = await supabase.from('outreach_prospects')
              .update({ status: 'completed' })
              .eq('id', btn.dataset.prospectId);
            if (error) throw error;
            toast('Prospect skipped');
            removeCard(btn);
            break;
          }
          case 'mark-handled': {
            const { error } = await supabase.from('outreach_prospects')
              .update({ status: 'completed' })
              .eq('id', btn.dataset.prospectId);
            if (error) throw error;
            toast('Marked as handled');
            removeCard(btn);
            break;
          }
        }
      } catch (err) {
        console.error('Action error:', err);
        toast('Action failed: ' + (err.message || 'Unknown error'), true);
        btn.disabled = false;
      }
    });
  });
}

function removeCard(btn) {
  const card = btn.closest('.card');
  if (card) {
    card.style.transition = 'opacity 0.3s, transform 0.3s';
    card.style.opacity = '0';
    card.style.transform = 'translateX(20px)';
    setTimeout(() => {
      card.remove();
      // Update metrics
      const remaining = document.querySelectorAll('#actions-list .card').length;
      document.getElementById('metric-review-val').textContent = remaining;
      if (remaining === 0) {
        document.getElementById('actions-list').innerHTML = `
          <div class="empty-state">
            <svg width="32" height="32" fill="none" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4" stroke="#46AEB8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="10" stroke="#46AEB8" stroke-width="1.5"/></svg>
            <p>All caught up. Next prospect research runs at 00:01 UTC.</p>
          </div>`;
      }
    }, 300);
  }
}

async function loadReplies() {
  repliesLoaded = true;
  const { data: prospects } = await safeQuery(() =>
    supabase.from('outreach_prospects').select('*').eq('status', 'replied').order('updated_at', { ascending: false })
  );

  const listSkeleton = document.getElementById('reply-list-skeleton');
  const listItems = document.getElementById('reply-list-items');
  listSkeleton.style.display = 'none';

  if (!prospects || prospects.length === 0) {
    listItems.innerHTML = '<div class="empty-state" style="padding:2rem;"><p>No replies waiting</p></div>';
    return;
  }

  listItems.innerHTML = prospects.map(p => {
    const intentScore = p.intent_score;
    let intentClass = 'intent-low';
    let intentLabel = 'No score';
    if (intentScore != null) {
      intentLabel = intentScore;
      if (intentScore >= 80) intentClass = 'intent-high';
      else if (intentScore >= 50) intentClass = 'intent-med';
    }

    return `
      <div class="reply-item unread" data-prospect-id="${p.id}" data-prospect='${escapeHtml(JSON.stringify(p))}'>
        <div class="reply-item-top">
          <span class="reply-item-name">${escapeHtml(p.contact_name || p.first_name || 'Unknown')}<span class="intent-pill ${intentClass}">${intentLabel}</span></span>
          <span class="reply-item-time">${timeAgo(p.updated_at || p.created_at)}</span>
        </div>
        <div class="reply-item-company">${escapeHtml(p.company_name || '')}</div>
        <div class="reply-item-snippet">${escapeHtml(truncate(p.reply_text || p.notes || '', 80))}</div>
      </div>`;
  }).join('');

  listItems.querySelectorAll('.reply-item').forEach(item => {
    item.addEventListener('click', () => {
      listItems.querySelectorAll('.reply-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      item.classList.remove('unread');
      showReplyDetail(JSON.parse(item.dataset.prospect));
    });
  });
}

function showReplyDetail(prospect) {
  selectedReplyId = prospect.id;
  const detail = document.getElementById('reply-detail');
  const intentScore = prospect.intent_score;
  let intentClass = 'intent-low';
  let intentLabel = 'No score';
  if (intentScore != null) {
    intentLabel = intentScore;
    if (intentScore >= 80) intentClass = 'intent-high';
    else if (intentScore >= 50) intentClass = 'intent-med';
  }

  detail.innerHTML = `
    <h3>${escapeHtml(prospect.contact_name || prospect.first_name || 'Unknown')} <span class="intent-pill ${intentClass}">${intentLabel}</span></h3>
    <div class="detail-company">${escapeHtml(prospect.company_name || '')}${prospect.title ? ' / ' + escapeHtml(prospect.title) : ''}</div>

    <div class="detail-section">
      <div class="detail-section-title">Reply</div>
      <div class="detail-text">${escapeHtml(prospect.reply_text || prospect.notes || 'No reply text available')}</div>
    </div>

    ${prospect.last_outreach_text ? `
    <div class="detail-section">
      <div class="detail-section-title">Original outreach</div>
      <div class="detail-text">${escapeHtml(prospect.last_outreach_text)}</div>
    </div>` : ''}

    <div class="detail-section">
      <div class="detail-section-title">Prospect context</div>
      <dl class="detail-context">
        ${prospect.company_name ? `<dt>Company</dt><dd>${escapeHtml(prospect.company_name)}</dd>` : ''}
        ${prospect.headcount ? `<dt>Headcount</dt><dd>${prospect.headcount}</dd>` : ''}
        ${prospect.sector ? `<dt>Sector</dt><dd>${escapeHtml(prospect.sector)}</dd>` : ''}
        ${prospect.icp_score != null ? `<dt>ICP score</dt><dd>${prospect.icp_score}</dd>` : ''}
        ${prospect.turnover_estimate ? `<dt>Turnover estimate</dt><dd>${escapeHtml(prospect.turnover_estimate)}</dd>` : ''}
        ${prospect.segment ? `<dt>Segment</dt><dd>${escapeHtml(prospect.segment)}</dd>` : ''}
      </dl>
    </div>

    <div class="card-actions" style="margin-top:1rem;">
      <button class="btn btn-secondary" disabled title="Coming phase 2">Draft AI reply</button>
      <button class="btn btn-primary" id="detail-mark-handled">Mark handled</button>
    </div>`;

  document.getElementById('detail-mark-handled').addEventListener('click', async () => {
    const btn = document.getElementById('detail-mark-handled');
    btn.disabled = true;
    try {
      const { error } = await supabase.from('outreach_prospects')
        .update({ status: 'completed' })
        .eq('id', prospect.id);
      if (error) throw error;
      toast('Marked as handled');
      // Remove from list
      const listItem = document.querySelector(`.reply-item[data-prospect-id="${prospect.id}"]`);
      if (listItem) listItem.remove();
      detail.innerHTML = '<div class="reply-detail-placeholder">Select a reply to view details</div>';
      // Update metric
      const remaining = document.querySelectorAll('.reply-item').length;
      document.getElementById('metric-replies-val').textContent = remaining;
    } catch (err) {
      toast('Failed to update', true);
      btn.disabled = false;
    }
  });
}

// ============================================================
// SIGNAL FEED
// ============================================================
async function loadSignals() {
  signalsLoaded = true;
  const skeleton = document.getElementById('signals-skeleton');
  const container = document.getElementById('signals-items');

  try {
    const threeDaysAgo = new Date(Date.now() - 3 * 86400000).toISOString();
    const { data: signals, error } = await supabase
      .from('signal_scanner_results')
      .select('*')
      .gte('created_at', threeDaysAgo)
      .order('relevance_score', { ascending: false })
      .limit(50);

    if (skeleton) skeleton.style.display = 'none';

    if (error) {
      container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-meta)">Signal feed not available yet. Table will be populated by the Reddit Signals agent.</div>';
      return;
    }

    if (!signals || signals.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-meta)">No signals in the last 3 days. Reddit Signals agent runs daily.</div>';
      return;
    }

    // Group by date
    const byDate = {};
    signals.forEach(s => {
      const date = s.created_at ? s.created_at.slice(0, 10) : 'Unknown';
      if (!byDate[date]) byDate[date] = [];
      byDate[date].push(s);
    });

    let html = '';
    for (const [date, items] of Object.entries(byDate)) {
      const dateLabel = new Date(date + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
      html += '<div style="margin-top:1rem;margin-bottom:0.5rem;font-size:12px;font-weight:500;color:var(--text-meta);text-transform:uppercase;letter-spacing:0.05em">' + escapeHtml(dateLabel) + ' (' + items.length + ' signals)</div>';

      items.forEach(s => {
        const scoreColor = s.relevance_score >= 9 ? 'var(--coral)' : s.relevance_score >= 7 ? 'var(--teal)' : 'var(--text-meta)';
        html += '<div class="action-card" style="cursor:pointer" onclick="this.querySelector(\'.signal-detail\').classList.toggle(\'hidden\')">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
        html += '<div style="flex:1">';
        html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
        html += '<span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;background:' + scoreColor + '15;color:' + scoreColor + '">r/' + escapeHtml(s.subreddit || '?') + '</span>';
        html += '<span style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;background:' + scoreColor + '15;color:' + scoreColor + '">' + (s.relevance_score || 0) + '/10</span>';
        html += '</div>';
        html += '<div style="font-size:14px;font-weight:500;line-height:1.4">' + escapeHtml(s.title || '') + '</div>';
        html += '</div>';
        html += '<div style="text-align:right;flex-shrink:0;margin-left:12px">';
        html += '<div style="font-size:11px;color:var(--text-meta)">' + (s.reddit_score || 0) + ' upvotes</div>';
        html += '<div style="font-size:11px;color:var(--text-meta)">' + (s.reddit_comments || 0) + ' comments</div>';
        html += '</div>';
        html += '</div>';
        html += '<div class="signal-detail hidden" style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">';
        html += '<div style="font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:6px"><strong>Angle:</strong> ' + escapeHtml(s.angle || 'No angle scored') + '</div>';
        if (s.url) html += '<a href="' + escapeHtml(s.url) + '" target="_blank" style="font-size:12px;color:var(--teal);text-decoration:none">View on Reddit &rarr;</a>';
        html += '</div>';
        html += '</div>';
      });
    }

    container.innerHTML = html;
  } catch (err) {
    if (skeleton) skeleton.style.display = 'none';
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-meta)">Could not load signals: ' + escapeHtml(err.message) + '</div>';
  }
}

// ============================================================
// POLLING
// ============================================================
let pollTimer = null;
function startPolling() {
  pollTimer = setInterval(async () => {
    await loadData();
    if (currentView === 'replies' && repliesLoaded) {
      await loadReplies();
    }
    if (currentView === 'signals' && signalsLoaded) {
      await loadSignals();
    }
  }, POLL_INTERVAL);
}

// ============================================================
// INIT
// ============================================================
async function initApp() {
  try {
    await loadData();
    startPolling();
  } catch (e) {
    console.error('Init error:', e);
    showErrorPage();
  }
}

if (checkAuth()) {
  initApp();
}
</script>
</body>
</html>
